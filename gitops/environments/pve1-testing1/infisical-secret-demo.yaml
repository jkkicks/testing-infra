# Demo: sync Infisical project secrets into a Kubernetes Secret.
#
# Prerequisite: Machine Identity + kubectl secret (see README — Infisical operator).
# Replace projectSlug / envSlug with exact slugs from Infisical (ASCII lowercase + digits + hyphens).
# envSlug is NOT always "production" — copy it from Project → Environments (may be prod, development, etc.).
# Placeholders like replace-me-project-slug will 404 until you edit them.
#
apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: demo-infisical-sync
  namespace: default
spec:
  authentication:
    universalAuth:
      secretsScope:
        projectSlug: kube-vault-1-zb-4n
        envSlug: prod
        secretsPath: "/"
        recursive: true
      credentialsRef:
        secretName: infisical-operator-machine-identity
        secretNamespace: infisical-system
  managedKubeSecretReferences:
    - secretName: demo-infisical-managed-secret
      secretNamespace: default
      template:
        includeAllSecrets: true
