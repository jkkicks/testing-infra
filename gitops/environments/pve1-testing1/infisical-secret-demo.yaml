# Demo: sync Infisical project secrets into a Kubernetes Secret.
#
# Prerequisites: Infisical standalone + Secrets Operator + machine identity secret (see README).
# Replace projectSlug / envSlug with exact slugs from Infisical (lowercase letters, digits, hyphens only).
# Display titles (e.g. "Production") are not slugs — use Project → Environments in the UI.
# Values below are deliberate placeholders; applying without editing yields API errors until you fix them.
#
apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: demo-infisical-sync
  namespace: default
spec:
  authentication:
    universalAuth:
      secretsScope:
        projectSlug: must-edit-project-slug
        envSlug: must-edit-env-slug
        secretsPath: "/"
        recursive: true
      credentialsRef:
        secretName: infisical-operator-machine-identity
        secretNamespace: infisical-system
  managedKubeSecretReferences:
    - secretName: demo-infisical-managed-secret
      secretNamespace: default
      template:
        includeAllSecrets: true
