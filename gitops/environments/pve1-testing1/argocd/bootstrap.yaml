# Apply once after Argo CD is installed: kubectl apply -f gitops/environments/pve1-testing1/argocd/bootstrap.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pve1-testing1-root
  namespace: argocd
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  source:
    repoURL: https://github.com/jkkicks/testing-infra.git
    targetRevision: main
    path: gitops/environments/pve1-testing1/argocd/apps
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
